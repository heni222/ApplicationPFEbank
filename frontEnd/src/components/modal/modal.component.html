<div *ngIf="isOpen" class="modal-backdrop" [class.backdropClass] @fadeIn (click)="onBackdropClick()">
  <div class="modal" [class]="getSizeClass()" @slideUp (click)="$event.stopPropagation()" role="dialog" aria-modal="true" [attr.aria-labelledby]="title ? 'modal-title' : null">
    <div class="modal__header" *ngIf="title || showClose">
      <h2 *ngIf="title" id="modal-title" class="modal__title">{{ title }}</h2>
      <button *ngIf="showClose" class="modal__close" (click)="onClose()" aria-label="Close modal">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    
    <div class="modal__body">
      <ng-content></ng-content>
    </div>
    
    <div class="modal__footer" *ngIf="showClose">
      <ng-content select="[modal-footer]"></ng-content>
    </div>
  </div>
</div>
