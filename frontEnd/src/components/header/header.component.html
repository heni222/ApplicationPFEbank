<!-- Header HTML - À intégrer dans home.component.html -->
<header class="topbar" [class.is-scrolled]="isScrolled">
  <div class="topbar__inner">
    <div class="topbar__brand">
      <span class="topbar__logo">◆</span>
      <span class="topbar__name">CréditFlow</span>
      <span class="badge-custom badge-custom--info">Pro</span>
    </div>

    <nav class="topbar__nav">
      <a routerLink="/dossiers" routerLinkActive="active">Dossiers</a>
      <a routerLink="/scoring" routerLinkActive="active">Scoring</a>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    </nav>

    <div class="topbar__actions">
      <button class="theme-toggle" (click)="toggleTheme()" [title]="theme() === 'light' ? 'Mode sombre' : 'Mode clair'">
        {{ theme() === 'light' ? '🌙' : '☀️' }}
      </button>
      <a class="btn-custom btn-custom--primary btn-custom--sm" routerLink="/login">
        Se connecter
      </a>
      <a class="btn-custom btn-custom--primary btn-custom--sm" routerLink="/singUp" (click)="closeMobileMenu()">
        Inscription
      </a>
      <button class="burger-menu" (click)="toggleMobileMenu()" [attr.aria-expanded]="mobileMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile Menu -->
<div class="mobile-menu" [class.is-open]="mobileMenuOpen">
  <nav class="mobile-menu__nav">
    <a routerLink="/dossiers" routerLinkActive="active" (click)="closeMobileMenu()">Dossiers</a>
    <a routerLink="/scoring" routerLinkActive="active" (click)="closeMobileMenu()">Scoring</a>
    <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMobileMenu()">Dashboard</a>
  </nav>
  <div class="mobile-menu__divider"></div>
  <div class="mobile-menu__actions">
    <a class="btn-custom btn-custom--primary mobile-menu__btn" routerLink="/login" (click)="closeMobileMenu()">
      Se connecter
    </a>
    <!-- Correction ici : routerLink pointe désormais vers /singUp -->
    <a class="btn-custom btn-custom--primary mobile-menu__btn" routerLink="/singUp" (click)="closeMobileMenu()">
      Inscription
    </a>
  </div>
</div>
