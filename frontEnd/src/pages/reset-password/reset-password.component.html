<!-- home.component.html (ou le fichier template dédié à la réinitialisation) -->
<div class="rp">
  <div class="container">
    <div class="card">
      
      <!-- En-tête de la carte avec badge dynamique -->
      <div class="card__header">
        <div class="badge">
          <span class="dot"></span>
          Sécurité bancaire
        </div>
        <h1>Réinitialiser le mot de passe</h1>
        <p>Veuillez configurer un nouveau mot de passe fort pour sécuriser l'accès à votre compte CréditFlow.</p>
      </div>

      <!-- Formulaire lié au FormGroup -->
      <form [formGroup]="form" (ngSubmit)="submit()" class="form">

        <!-- Champ : Nouveau mot de passe -->
        <div class="field">
          <label for="password">Nouveau mot de passe</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Entrez votre nouveau mot de passe"
            [class.is-invalid]="form.get('password')?.touched && form.get('password')?.invalid"
          />
          <!-- Gestion des erreurs native Angular intégrée aux classes SCSS -->
          <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.errors?.['required']">
            Le mot de passe est obligatoire.
          </span>
        </div>

        <!-- Champ : Confirmation -->
        <div class="field">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <input
            id="confirmPassword"
            type="password"
            formControlName="confirmPassword"
            placeholder="Confirmez le mot de passe"
            [class.is-invalid]="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.invalid"
          />
          <span class="error" *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.errors?.['mustMatch']">
            Les mots de passe ne correspondent pas.
          </span>
        </div>

        <!-- Messages Flash de notification -->
        <p class="message message-success" *ngIf="message">
          {{ message }}
        </p>

        <p class="message message-error" *ngIf="error">
          {{ error }}
        </p>

        <!-- Bouton de validation avec Spinner CSS automatique via :disabled -->
        <button type="submit" class="btn btn--primary" [disabled]="loading || form.invalid">
          {{ loading ? 'Chargement...' : 'Réinitialiser le mot de passe' }}
        </button>

        <!-- Liens de secours UX en bas de formulaire -->
        <div class="links">
          <a routerLink="/login">← Retour à la connexion</a>
        </div>

      </form>
    </div>
  </div>
</div>
